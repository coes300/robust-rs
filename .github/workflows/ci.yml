name: CI
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Pure-Rust gates for the two library crates. `pyrobust` is excluded here: it
  # is a Python extension (cdylib linking against the host interpreter), so it is
  # built and tested in the `python` job below via maturin.
  rust:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --exclude pyrobust --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --exclude pyrobust --all-targets
      - name: Test
        run: cargo test --workspace --exclude pyrobust
      - name: Doc
        run: cargo doc --workspace --exclude pyrobust --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Doc tests
        run: cargo test --doc --workspace --exclude pyrobust

  # The pyrobust Python bindings: clippy the Rust side, then build the extension
  # with maturin and run the pytest suite against it.
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Clippy (bindings)
        run: cargo clippy -p pyrobust --features extension-module -- -D warnings
      - name: Set up venv and tooling
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip maturin pytest numpy \
            scikit-learn statsmodels scipy
      - name: Build and install the extension
        run: .venv/bin/maturin develop -m py/Cargo.toml
      - name: Pytest (incl. cross-language + sklearn/statsmodels cross-refs)
        run: .venv/bin/pytest py/tests -q
